name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JS dependencies
        run: npm ci

      - name: Install PyMuPDF
        run: python -m pip install pymupdf

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Typecheck
        run: npm run check

      - name: Build
        run: npm run build

      - name: Launch readiness
        env:
          SESSION_SECRET: ci-secret
          APP_URL: http://127.0.0.1:5000
          PAYMENT_AMOUNT_CENTS: "14900"
          SUPPORTED_USCIS_EDITION: "01/20/25"
        run: npm run health:check

      - name: E2E
        env:
          SESSION_SECRET: ci-secret
          APP_URL: http://127.0.0.1:5000
          PAYMENT_AMOUNT_CENTS: "14900"
          SUPPORTED_USCIS_EDITION: "01/20/25"
        run: npm run test:ui
